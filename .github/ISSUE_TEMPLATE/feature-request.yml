name: Feature Request
description: Request a new feature for this sample?
labels: [ enhancement ]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature request?
      description: |
        Please leave a helpful description of the feature request here.
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use Case
      description: |
        Describe the use case or problem this feature would solve.
        E.g. "As a developer, I want to ... so that ..."
    validations:
      required: true

  - type: textarea
    id: resources
    attributes:
      label: New or Affected Resource(s)
      description: |
        Please list the new or affected resources
    validations:
      required: true

  - type: textarea
    id: documentation
    attributes:
      label: Provide a documentation link
      description: |
        Please provide any links to the documentation that is at
        https://developer.okta.com/. This will help us with this
        feature request.

  - type: textarea
    id: additional
    attributes:
      label: Additional Information?