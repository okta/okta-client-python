version: 2.1

orbs:
  # cci-ignore-start
  platform-helpers: okta/platform-helpers@1
  general-platform-helpers: okta/general-platform-helpers@1
  browser-tools: circleci/browser-tools@1
  # cci-ignore-end

commands:
  install-dependencies:
    steps:
      - run:
          name: Install dependencies
          command: python -m pip install -r requirements.txt
      - run:
          name: Install dev dependencies
          command: python -m pip install -r dev-requirements.txt
      - run:
          name: Install okta-client package
          command: python -m pip install -e ".[dev]"

jobs:
  setup:
    docker: &docker_image
      - image: registry.aue1e.internal/atko-eng-services/cimg/python:3.11.14-d4cbe51
    # cci-ignore-next-line
    resource_class: &resource_class atko-eng/containeragent_prod-worker_aue1k_linux-small
    steps:
      - checkout
      - general-platform-helpers/step-secrets-obtain:
          secret-key: TEST_ORG_DEFAULT;TEST_ORG_WEB;TEST_ORG_CLIENT_SECRET_API;TEST_ORG_CLIENT_ASSERTION_API;TEST_ORG_PRIVATE_KEY;TEST_ORG_PUBLIC_KEY;TEST_CONFIGURATION_1FA;TEST_CONFIGURATION_AI_AGENT
      - general-platform-helpers/step-load-dependencies
      - run:
          name: "Store configuration files"
          command: |
            if [[ -n "${TEST_ORG_DEFAULT}" ]]; then
              echo "${TEST_ORG_DEFAULT}" > okta-default.json
            fi
            if [[ -n "${TEST_ORG_CLIENT_SECRET_API}" ]]; then
              echo "${TEST_ORG_CLIENT_SECRET_API}" > okta-client-secret-api.json
            fi
            if [[ -n "${TEST_ORG_CLIENT_ASSERTION_API}" ]]; then
              echo "${TEST_ORG_CLIENT_ASSERTION_API}" > okta-client-assertion-api.json
            fi
            if [[ -n "${TEST_ORG_PRIVATE_KEY}" ]]; then
              echo "${TEST_ORG_PRIVATE_KEY}" > okta-private-key.pem
            fi
            if [[ -n "${TEST_ORG_PUBLIC_KEY}" ]]; then
              echo "${TEST_ORG_PUBLIC_KEY}" > okta-public-key.json
            fi
            if [[ -n "${TEST_CONFIGURATION_1FA}" ]]; then
              echo "${TEST_CONFIGURATION_1FA}" > test-configuration-1fa.json
            fi
            if [[ -n "${TEST_ORG_WEB}" ]]; then
              echo "${TEST_ORG_WEB}" > okta-web.json
            fi
            if [[ -n "${TEST_CONFIGURATION_AI_AGENT}" ]]; then
              echo "${TEST_CONFIGURATION_AI_AGENT}" > test-configuration-ai-agent.json
            fi
      - persist_to_workspace:
          root: ~/project
          paths:
            - .

  build_and_test:
    docker: *docker_image
    # cci-ignore-next-line
    resource_class: *resource_class
    steps:
      - attach_workspace:
          at: ~/project
      - install-dependencies
      - run:
          name: Create test results directory
          command: mkdir -p test-results
      - run:
          name: Lint Codebase
          command: |
            make lint
      - run:
          name: Run Tests with Coverage
          command: |
            make test-cov JUNIT_XML=test-results/unit-tests.xml
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: coverage-html
          destination: coverage
      - store_artifacts:
          path: coverage.xml
          destination: coverage/coverage.xml
      - persist_to_workspace:
          root: ~/project
          paths:
            - .

  integration-tests:
    docker: *docker_image
    # cci-ignore-next-line
    resource_class: *resource_class
    steps:
      - attach_workspace:
          at: ~/project
      - run:
          name: "Verify configuration secrets"
          command: |
            expected_files=(
              okta-default.json
              okta-web.json
              okta-client-secret-api.json
              okta-client-assertion-api.json
              okta-private-key.pem
              okta-public-key.json
              test-configuration-1fa.json
              test-configuration-ai-agent.json
            )
            missing_files=()
            for expected_file in "${expected_files[@]}"; do
              if [[ ! -f "$expected_file" ]]; then
                missing_files+=("$expected_file")
              fi
            done
            if (( ${#missing_files[@]} )); then
              echo "Missing configuration files:"
              printf ' - %s\n' "${missing_files[@]}"
              exit 1
            fi
      - install-dependencies
      - browser-tools/install-chrome
      - browser-tools/install-chromedriver
      - run:
          name: Create test results directory
          command: mkdir -p test-results
      - run:
          name: Integration tests
          environment:
            CI: "true"
          command: |
            make integration JUNIT_XML=test-results/integration-tests.xml
      - store_test_results:
          path: test-results

  snyk-scan:
    docker: *docker_image
    # cci-ignore-next-line
    resource_class: *resource_class
    steps:
      - attach_workspace:
          at: ~/project
      - install-dependencies
      - general-platform-helpers/step-load-dependencies
      - general-platform-helpers/step-run-snyk-monitor:
          scan-all-projects: true
          skip-unresolved: false
          run-on-non-main: true

workflows:
  tests:
    jobs:
      - setup
      - build_and_test:
          requires:
            - setup
      - integration-tests:
          requires:
            - setup

  security-scan:
    jobs:
      - setup:
          filters:
            branches:
              only:
                - main
      - general-platform-helpers/job-snyk-prepare:
          name: prepare-snyk
          requires:
            - setup
      - snyk-scan:
          name: execute-snyk
          context:
            - static-analysis
          requires:
            - prepare-snyk
